<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ujian Kesetiaan Arifin v6.0</title>
    <style>
        body { margin: 0; font-family: 'Arial', sans-serif; background: #fafafa; color: #333; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        #quiz-container { background: #fff; width: 92%; max-width: 450px; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border: 1px solid #eee; }
        .header { text-align: center; border-bottom: 2px solid #ff4d6d; margin-bottom: 20px; padding-bottom: 10px; }
        .q-num { font-size: 0.8rem; color: #888; margin-bottom: 5px; }
        .q-text { font-size: 1.1rem; font-weight: bold; margin-bottom: 20px; color: #222; line-height: 1.4; }
        .option { display: block; background: #f8f9fa; border: 1px solid #ddd; padding: 15px; margin-bottom: 10px; border-radius: 12px; cursor: pointer; transition: 0.2s; font-size: 0.9rem; }
        .option:hover { background: #fff0f3; border-color: #ff4d6d; }
        .option.selected { background: #ff4d6d; color: white; border-color: #ff4d6d; }
        #btn-next { background: #ff4d6d; color: white; border: none; padding: 15px; width: 100%; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 1rem; margin-top: 10px; }
        
        /* Layar Hasil Evaluasi */
        #result-screen { display: none; text-align: center; }
        .score-circle { width: 120px; height: 120px; border-radius: 50%; border: 8px solid #ff4d6d; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; font-weight: bold; margin: 20px auto; color: #ff4d6d; }
        .review-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin: 20px 0; }
        .review-box { padding: 10px; border-radius: 8px; font-weight: bold; font-size: 0.8rem; color: white; }
        .bg-green { background: #28a745; }
        .bg-red { background: #dc3545; }
        .final-msg { font-size: 1rem; line-height: 1.5; color: #555; margin-bottom: 25px; }
    </style>
</head>
<body>

    <div id="quiz-container">
        <div id="quiz-content">
            <div class="header">
                <h2 style="margin:0; color: #ff4d6d;">LOYALTY TEST</h2>
                <p style="font-size: 0.7rem; color: #888;">Arifin's Official Relationship Exam</p>
            </div>
            <div id="q-number" class="q-num">Pertanyaan 1/20</div>
            <div id="question-box"></div>
            <button id="btn-next" onclick="nextQuestion()">LANJUT →</button>
        </div>

        <div id="result-screen">
            <div class="header"><h2 style="margin:0;">HASIL UJIAN</h2></div>
            <div class="score-circle" id="final-score">0%</div>
            
            <p style="font-size: 0.9rem; font-weight: bold;">Rincian Jawaban (1-20):</p>
            <div id="review-list" class="review-grid"></div>
            
            <p class="final-msg" id="result-msg"></p>
            
            <button onclick="location.reload()" style="background:#333; color:white; border:none; padding:15px; width:100%; border-radius:12px; font-weight:bold; cursor:pointer;">ULANGI UJIAN</button>
        </div>
    </div>

    <script>
        const questions = [
            { q: "Siapa orang paling ganteng di hidup kamu?", a: ["Arifin", "Idol K-Pop", "Mantan"], c: 0 },
            { q: "Kalau ada cowok lebih ganteng, respon kamu?", a: ["Liatin terus", "Arifin tetep nomor 1", "Minta kenalan"], c: 1 },
            { q: "Arifin tiba-bitu ngilang seharian, kamu?", a: ["Marah", "Sabar & tungguin", "Cari cowok lain"], c: 1 },
            { q: "Ada cowok tajir deketin kamu?", a: ["Respon dikit", "Cuma butuh Arifin", "Minta beliin barang"], c: 1 },
            { q: "Seberapa sayang kamu sama Arifin?", a: ["Gak sayang", "Dikit", "Banget banget banget!"], c: 2 },
            { q: "Kalau Arifin lagi susah, kamu?", a: ["Ninggalin", "Nemenin & dukung", "Cari yang mapan"], c: 1 },
            { q: "Pilih: Kehilangan Arifin atau Kehilangan HP?", a: ["Kehilangan Arifin", "Kehilangan HP", "Gak tau"], c: 1 },
            { q: "Siapa pemilik masa depan kamu?", a: ["Gak tau", "Arifin", "Mantan"], c: 1 },
            { q: "Kalau Arifin minta cium, dikasih?", a: ["Gak mau", "Boleh dong", "Dikasih banyak!"], c: 2 },
            { q: "Arifin cemburu kamu deket cowok lain, kamu?", a: ["Marahin balik", "Jaga jarak demi dia", "Bodo amat"], c: 1 },
            { q: "Janji gak bakal bohong sama Arifin?", a: ["Gak janji", "Janji suci!", "Tergantung"], c: 1 },
            { q: "Siapa yang paling spesial di galeri HP?", a: ["Foto Arifin", "Selfie sendiri", "Foto cowok lain"], c: 0 },
            { q: "Ada yang jelek-jelekin Arifin, kamu?", a: ["Ikut ketawa", "Bela abis-abisan", "Diem aja"], c: 1 },
            { q: "Arifin itu bagi kamu adalah?", a: ["Beban", "Anugerah terindah", "Temen biasa"], c: 1 },
            { q: "Mau nikah sama Arifin?", a: ["Mau banget!", "Gak tau ya", "Males"], c: 0 },
            { q: "Ajak makan di pinggir jalan, kamu?", a: ["Gengsi", "Mau asalkan sama dia", "Minta mahal"], c: 1 },
            { q: "Sering kangen Arifin gak?", a: ["Gak pernah", "Tiap detik kangen", "Kalo gabut"], c: 1 },
            { q: "Arifin minta password IG kamu?", a: ["Privacy!", "Dikasih tanpa mikir", "Ganti dulu"], c: 1 },
            { q: "Pernah kepikiran buat selingkuh?", a: ["Sering", "Gak pernah sama sekali!", "Pernah dikit"], c: 1 },
            { q: "Terakhir, Arifin itu milik siapa?", a: ["Milik bersama", "Milik aku selamanya", "Milik emaknya"], c: 1 }
        ];

        let currentIdx = 0;
        let score = 0;
        let selectedOpt = null;
        let userResults = [];

        function displayQuestion() {
            const q = questions[currentIdx];
            document.getElementById('q-number').innerText = `Pertanyaan ${currentIdx + 1}/20`;
            let html = `<div class="q-text">${q.q}</div>`;
            q.a.forEach((opt, i) => {
                html += `<div class="option" onclick="selectOpt(${i}, this)">${opt}</div>`;
            });
            document.getElementById('question-box').innerHTML = html;
        }

        function selectOpt(idx, el) {
            selectedOpt = idx;
            document.querySelectorAll('.option').forEach(e => e.classList.remove('selected'));
            el.classList.add('selected');
        }

        function nextQuestion() {
            if (selectedOpt === null) return alert("Jawab dulu ya sayang!");
            
            let isCorrect = (selectedOpt === questions[currentIdx].c);
            if (isCorrect) score += 5;
            userResults.push(isCorrect);

            currentIdx++;
            selectedOpt = null;

            if (currentIdx < questions.length) {
                displayQuestion();
            } else {
                showResult();
            }
        }

        function showResult() {
            document.getElementById('quiz-content').style.display = 'none';
            document.getElementById('result-screen').style.display = 'block';
            document.getElementById('final-score').innerText = score + "%";
            
            let reviewHtml = "";
            userResults.forEach((res, i) => {
                reviewHtml += `<div class="review-box ${res ? 'bg-green' : 'bg-red'}">${i+1}</div>`;
            });
            document.getElementById('review-list').innerHTML = reviewHtml;
            
            let msg = "";
            if (score === 100) {
                msg = "<b>SEMPURNA!</b><br>Kamu terbukti 100% setia. Arifin beneran beruntung punya kamu. Love you! ❤️";
                document.getElementById('final-score').style.color = "#28a745";
                document.getElementById('final-score').style.borderColor = "#28a745";
            } else if (score >= 80) {
                msg = "<b>Hampir Setia!</b><br>Masih ada yang salah dikit. Coba diperbaiki lagi ya kejujurannya buat Arifin.";
            } else {
                msg = "<b>WADUH!</b><br>Skor kamu rendah banget. Kamu beneran sayang Arifin gak sih? Jelaskan ke Arifin sekarang!";
            }
            document.getElementById('result-msg').innerHTML = msg;
        }

        displayQuestion();
    </script>
</body>
</html>
