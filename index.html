<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Private Live Stream - Our Space</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body {
            margin: 0; padding: 0;
            background: #0b0e14;
            color: #fff;
            font-family: sans-serif;
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; min-height: 100vh;
        }
        .container { width: 90%; max-width: 700px; text-align: center; }
        .video-box { 
            width: 100%; aspect-ratio: 16/9; 
            background: #000; border-radius: 15px; 
            border: 2px solid #e91e63; margin-bottom: 20px;
            overflow: hidden;
        }
        video { width: 100%; height: 100%; object-fit: contain; }
        .controls { display: flex; flex-direction: column; gap: 10px; }
        .row { display: flex; gap: 10px; justify-content: center; }
        input { 
            padding: 12px; border-radius: 8px; border: none; 
            background: #1e2530; color: #fff; flex: 1;
        }
        button { 
            padding: 12px 20px; border-radius: 8px; border: none; 
            cursor: pointer; font-weight: bold; transition: 0.3s;
        }
        .btn-main { background: #e91e63; color: white; }
        .btn-sub { background: #2196f3; color: white; }
        button:active { transform: scale(0.95); }
        #my-id-display { color: #ffeb3b; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <h1 style="color: #e91e63;">Our Secret Live ❤️</h1>
    <p>ID Kamu: <span id="my-id-display" onclick="copyMyId()">Sedang memuat ID...</span></p>

    <div class="video-box">
        <video id="remote-video" autoplay playsinline></video>
    </div>

    <div class="controls">
        <button class="btn-main" id="btn-start" onclick="startStream()">1. Mulai Share Screen</button>
        
        <div class="row">
            <input type="text" id="target-id" placeholder="Masukkan ID Pasangan">
            <button class="btn-sub" onclick="connectToPartner()">2. Tonton Live</button>
        </div>
    </div>
    <p style="font-size: 12px; color: #666; margin-top: 20px;">*Klik ID kamu untuk menyalin</p>
</div>

<script>
    const peer = new Peer();
    let localStream;

    // Dapetin ID unik otomatis
    peer.on('open', (id) => {
        document.getElementById('my-id-display').innerText = id;
    });

    // Nerima panggilan dari pacar
    peer.on('call', (call) => {
        call.answer(); 
        call.on('stream', (remoteStream) => {
            document.getElementById('remote-video').srcObject = remoteStream;
        });
    });

    // Fungsi Mulai Share Screen
    async function startStream() {
        try {
            localStream = await navigator.mediaDevices.getDisplayMedia({
                video: true,
                audio: true
            });
            document.getElementById('remote-video').srcObject = localStream;
            alert("Share screen aktif! Sekarang kasih ID lu ke dia.");
        } catch (err) {
            alert("Gagal: Pastikan web pakai HTTPS atau coba di Chrome/Edge.");
        }
    }

    // Fungsi Connect ke Pasangan
    function connectToPartner() {
        const targetId = document.getElementById('target-id').value;
        if (!targetId) return alert("Isi ID pasangan dulu!");

        // Kita panggil dia dan kirim stream kita (biar dia bisa liat)
        const call = peer.call(targetId, localStream);
        call.on('stream', (remoteStream) => {
            document.getElementById('remote-video').srcObject = remoteStream;
        });
    }

    function copyMyId() {
        const idText = document.getElementById('my-id-display').innerText;
        navigator.clipboard.writeText(idText);
        alert("ID Berhasil di-copy: " + idText);
    }
</script>

</body>
</html>
