<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>four girls💅💞 | forever.</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600&family=Reenie+Beanie&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #000; overflow-x: hidden; color: #fff;
            font-family: 'Plus Jakarta Sans', sans-serif;
            display: flex; justify-content: center; min-height: 100vh;
        }

        /* ANIMASI BINTANG */
        .stars-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
            background: radial-gradient(ellipse at bottom, #1B2735 0%, #090A0F 100%);
        }
        .star {
            position: absolute; background: white; border-radius: 50%;
            opacity: 0.5; animation: moveStars linear infinite;
        }
        @keyframes moveStars {
            from { transform: translateY(0); }
            to { transform: translateY(-1000px); }
        }

        .container {
            width: 100%; max-width: 450px;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(10px);
            min-height: 100vh; padding-bottom: 50px;
            border-left: 1px solid rgba(255,255,255,0.1);
            border-right: 1px solid rgba(255,255,255,0.1);
        }

        /* FLOATING MUSIC INDICATOR */
        .music-notif {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(255, 118, 117, 0.9); padding: 10px 20px;
            border-radius: 50px; font-size: 0.7rem; font-weight: 600;
            z-index: 999; display: flex; align-items: center; gap: 10px;
            box-shadow: 0 5px 15px rgba(255, 118, 117, 0.4);
            transition: 0.5s; opacity: 1;
        }

        header { padding: 80px 20px 40px; text-align: center; }
        header h1 { font-weight: 600; font-size: 2.2rem; color: #fff; text-shadow: 0 0 15px rgba(255,255,255,0.3); }
        header p { font-size: 0.7rem; color: #888; text-transform: uppercase; letter-spacing: 3px; margin-top: 8px; }

        .quote-box {
            margin: 0 30px 50px; padding: 25px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px; text-align: center;
            border: 1px dashed rgba(255, 118, 117, 0.5);
        }

        /* POLAROID GALLERY */
        .photo-list { padding: 0 30px; }
        .polaroid {
            background: white; padding: 15px 15px 45px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            margin-bottom: 50px; transition: 0.4s;
        }
        /* Variasi rotasi foto biar natural */
        .polaroid:nth-child(3n+1) { transform: rotate(-2deg); }
        .polaroid:nth-child(3n+2) { transform: rotate(2deg); }
        .polaroid:nth-child(3n+3) { transform: rotate(-1deg); }

        .polaroid img { width: 100%; aspect-ratio: 1/1; object-fit: cover; margin-bottom: 20px; }
        .polaroid .caption {
            font-family: 'Reenie Beanie', cursive; font-size: 1.9rem;
            color: #2d3436; text-align: center;
        }

        footer { text-align: center; padding: 40px; color: #555; font-size: 0.75rem; }

        /* EQUALIZER */
        .eq { display: flex; align-items: flex-end; gap: 3px; height: 12px; }
        .bar { width: 2px; background: white; animation: bounce 0.6s infinite alternate; }
        @keyframes bounce { from { height: 2px; } to { height: 12px; } }
    </style>
</head>
<body>

<div class="stars-container" id="starField"></div>

<div class="music-notif" id="musicStatus">
    <div class="eq"><div class="bar"></div><div class="bar" style="animation-delay:0.2s"></div><div class="bar" style="animation-delay:0.4s"></div></div>
    <span>SCROLL UNTUK MUSIK ✨</span>
</div>

<div class="container">
    <audio id="mainAudio" loop>
        <source src="hindia.mp3" type="audio/mpeg">
    </audio>

    <header>
        <h1>four girls💅💞</h1>
        <p>the only circle that matters</p>
    </header>

    <div class="quote-box">
        <p>"bismillah rencana terlaksana 🥰🥰🥰💅"</p>
    </div>

    <div class="photo-list">
        <div class="polaroid"><img src="foto 1.jpg"><p class="caption">memory 01</p></div>
        <div class="polaroid"><img src="foto 2.jpg"><p class="caption">best team ❤️</p></div>
        <div class="polaroid"><img src="foto 3.jpg"><p class="caption">no drama.</p></div>
        <div class="polaroid"><img src="foto 4.jpg"><p class="caption">together vibes.</p></div>
        <div class="polaroid"><img src="foto 5.jpg"><p class="caption">solidaritas ✨</p></div>
        <div class="polaroid"><img src="foto 6.jpg"><p class="polaroid-img"><img src="foto 6.jpg"><p class="caption">momen berharga</p></div>
        <div class="polaroid"><img src="foto 7.jpg"><p class="caption">slay 💅</p></div>
        <div class="polaroid"><img src="foto 8.jpg"><p class="caption">happy day!</p></div>
        <div class="polaroid"><img src="foto 9.jpg"><p class="caption">unforgettable</p></div>
        <div class="polaroid"><img src="foto 10.jpg"><p class="caption">support system</p></div>
        <div class="polaroid"><img src="foto 11.jpg"><p class="caption">forever.</p></div>
    </div>

    <footer>
        four girls💅💞 • 2026<br>
        Scroll up to remember.
    </footer>
</div>

<script>
    // Bintang Background
    const starField = document.getElementById('starField');
    for (let i = 0; i < 100; i++) {
        const star = document.createElement('div');
        star.className = 'star';
        star.style.left = Math.random() * 100 + '%';
        star.style.top = Math.random() * 100 + '%';
        star.style.animationDuration = (Math.random() * 3 + 2) + 's';
        star.style.width = Math.random() * 2 + 'px';
        star.style.height = star.style.width;
        starField.appendChild(star);
    }

    // AUTO PLAY ON SCROLL / TOUCH
    const audio = document.getElementById("mainAudio");
    const musicStatus = document.getElementById("musicStatus");
    let isPlaying = false;

    function startMusic() {
        if (!isPlaying) {
            audio.play().then(() => {
                isPlaying = true;
                musicStatus.style.opacity = "0"; // Hilangkan notif pas musik jalan
                setTimeout(() => musicStatus.style.display = "none", 500);
            }).catch(e => console.log("Menunggu interaksi..."));
        }
    }

    // Trigger pas scroll, klik, atau sentuh layar
    window.addEventListener('scroll', startMusic);
    window.addEventListener('click', startMusic);
    window.addEventListener('touchstart', startMusic);
</script>

</body>
</html>
