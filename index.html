<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Private Space</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;500&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0d0d0d; /* Tema Gelap */
            color: #ffffff;
            font-family: 'Quicksand', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Efek Bintang Jatuh Sederhana */
        .stars {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: radial-gradient(ellipse at bottom, #1B2735 0%, #090A0F 100%);
        }

        header {
            text-align: center;
            margin-top: 50px;
        }

        h1 { font-weight: 500; letter-spacing: 2px; }
        p { font-weight: 300; color: #aaa; }

        .video-container {
            width: 80%;
            max-width: 800px;
            background: #1a1a1a;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            margin: 30px 0;
            overflow: hidden;
            position: relative;
            border: 1px solid #333;
        }

        video {
            width: 100%;
            display: block;
            background: #000;
        }

        .controls {
            margin-bottom: 50px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            padding: 12px 25px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-family: 'Quicksand', sans-serif;
            font-weight: 500;
            transition: 0.3s;
        }

        .btn-share { background: #e91e63; color: white; }
        .btn-join { background: #2196f3; color: white; }
        .btn-share:hover, .btn-join:hover { opacity: 0.8; transform: scale(1.05); }

        .peer-id-box {
            font-size: 0.8rem;
            color: #777;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

    <div class="stars"></div>

    <header>
        <h1>Our World</h1>
        <p>Watching together, even miles apart.</p>
    </header>

    <div class="video-container">
        <video id="remote-video" autoplay playsinline></video>
        <video id="local-video" autoplay muted playsinline style="display:none;"></video>
    </div>

    <div class="peer-id-box">
        ID Kamu: <span id="my-id">Menghubungkan...</span>
    </div>

    <div class="controls">
        <button class="btn-share" onclick="startScreenShare()">Mulai Share Screen</button>
        
        <input type="text" id="target-id" placeholder="Masukkan ID Pasangan" style="padding: 10px; border-radius: 20px; border:none;">
        <button class="btn-join" onclick="connectToPeer()">Tonton Sekarang</button>
    </div>

    <script>
        const peer = new Peer(); // Membuat ID unik otomatis
        let myStream;

        // Menampilkan ID kamu di layar
        peer.on('open', (id) => {
            document.getElementById('my-id').innerText = id;
        });

        // Logika saat ada panggilan masuk (Pacar kamu klik "Tonton")
        peer.on('call', (call) => {
            call.answer(); // Menjawab panggilan
            call.on('stream', (remoteStream) => {
                document.getElementById('remote-video').srcObject = remoteStream;
            });
        });

        // Fungsi buat kamu (Pengirim Layar)
        async function startScreenShare() {
            try {
                myStream = await navigator.mediaDevices.getDisplayMedia({
                    video: { cursor: "always" },
                    audio: true
                });
                document.getElementById('remote-video').srcObject = myStream;
                alert("Screen share aktif! Kasih ID kamu ke doi ya.");
            } catch (err) {
                console.error("Gagal share screen: " + err);
            }
        }

        // Fungsi buat pasangan (Penerima Layar)
        function connectToPeer() {
            const targetId = document.getElementById('target-id').value;
            if (!targetId) {
                alert("Masukkan ID dulu dong!");
                return;
            }
            
            // Pasangan memanggil kamu (tapi kamu yang kirim stream-nya nanti)
            // Note: Untuk P2P sederhana, ini butuh kamu sudah "Start Share" dulu
            const call = peer.call(targetId, myStream);
            call.on('stream', (remoteStream) => {
                document.getElementById('remote-video').srcObject = remoteStream;
            });
        }
    </script>
</body>
</html>
