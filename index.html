<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>four girls💅💞 | forever.</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600&family=Reenie+Beanie&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background-color: #f8f9fa;
            background-image: url("https://www.transparenttextures.com/patterns/cream-pixels.png"); /* Efek kertas halus */
            font-family: 'Plus Jakarta Sans', sans-serif;
            display: flex; justify-content: center; min-height: 100vh;
            color: #2d3436;
        }

        .container {
            width: 100%; max-width: 450px;
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(10px);
            min-height: 100vh; padding-bottom: 50px;
        }

        /* Music Bar Floated */
        .music-player {
            position: sticky; top: 15px; z-index: 100;
            background: white; width: 90%; margin: 0 auto;
            padding: 12px 20px; border-radius: 50px;
            display: flex; align-items: center; gap: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            cursor: pointer; border: 1px solid #f1f1f1;
        }
        .music-text { font-size: 0.8rem; font-weight: 600; color: #fab1a0; }

        header { padding: 60px 20px 40px; text-align: center; }
        header h1 { font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 600; letter-spacing: -1px; font-size: 2.2rem; color: #ff7675; }
        header p { font-size: 0.8rem; color: #b2bec3; margin-top: 5px; text-transform: uppercase; letter-spacing: 2px; }

        .mission-box {
            margin: 0 25px 50px; padding: 20px;
            background: #fff; border-radius: 15px;
            text-align: center; border: 1px dashed #fab1a0;
        }
        .mission-box p { font-size: 0.9rem; font-style: italic; color: #636e72; }

        /* Polaroid Style */
        .polaroid-wrapper { padding: 0 25px; }
        .polaroid {
            background: white; padding: 15px 15px 35px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            margin-bottom: 40px; transform: rotate(-1deg);
            transition: 0.3s ease;
        }
        .polaroid:nth-child(even) { transform: rotate(1.5deg); }
        .polaroid:hover { transform: rotate(0deg) scale(1.02); z-index: 10; }
        
        .polaroid img { 
            width: 100%; aspect-ratio: 1/1; object-fit: cover; 
            filter: contrast(1.05) brightness(1.02);
            margin-bottom: 20px;
        }
        .polaroid .caption {
            font-family: 'Reenie Beanie', cursive; /* Font tulisan tangan */
            font-size: 1.6rem; color: #2d3436; text-align: center;
        }

        footer { text-align: center; padding: 40px; color: #b2bec3; font-size: 0.7rem; }

        /* Equalizer Animation */
        .eq { display: flex; align-items: flex-end; gap: 2px; height: 12px; }
        .bar { width: 2px; background: #fab1a0; animation: play 0.6s infinite alternate; }
        .paused .bar { animation-play-state: paused; height: 2px; }
        @keyframes play { from { height: 2px; } to { height: 12px; } }
    </style>
</head>
<body>

<div class="container">
    <audio id="mainAudio" loop>
        <source src="Hindia - everything u are Lirik Lagu.mp3" type="audio/mpeg">
    </audio>

    <div class="music-player" onclick="toggleMusic()">
        <div class="eq paused" id="eq">
            <div class="bar" style="animation-delay: 0.1s"></div>
            <div class="bar" style="animation-delay: 0.3s"></div>
            <div class="bar" style="animation-delay: 0.2s"></div>
        </div>
        <span class="music-text" id="m-status">Tap to Play Hindia</span>
    </div>

    <header>
        <h1>four girls💅💞</h1>
        <p>A Lifetime Journey</p>
    </header>

    <div class="mission-box">
        <p>"bismillah rencana terlaksana 🥰🥰🥰💅"</p>
        <small style="display:block; margin-top:10px; color:#dfe6e9; font-size:0.6rem;">Est. 06.02.26</small>
    </div>

    <div class="polaroid-wrapper">
        <div class="polaroid">
            <img src="foto 1.jpg" alt="Memory">
            <p class="caption">just being us.</p>
        </div>

        <div class="polaroid">
            <img src="foto 2.jpg" alt="Memory">
            <p class="caption">the best team ❤️</p>
        </div>

        <div class="polaroid">
            <img src="foto 3.jpg" alt="Memory">
            <p class="caption">rencana kita ✨</p>
        </div>

        <div class="polaroid">
            <img src="foto 4.jpg" alt="Memory">
            <p class="caption">forever vibes.</p>
        </div>
    </div>

    <footer>
        four girls💅💞 • 2026<br>
        no drama, just love.
    </footer>
</div>

<script>
    const audio = document.getElementById("mainAudio");
    const mStatus = document.getElementById("m-status");
    const eq = document.getElementById("eq");

    function toggleMusic() {
        if (audio.paused) {
            audio.play();
            mStatus.innerText = "Playing: Everything U Are";
            eq.classList.remove("paused");
        } else {
            audio.pause();
            mStatus.innerText = "Music Paused";
            eq.classList.add("paused");
        }
    }
</script>

</body>
</html>
