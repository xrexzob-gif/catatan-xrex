<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>four girls💅💞 | Together Forever</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;600;800&family=Reenie+Beanie&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background: #000; 
            overflow: hidden; 
            color: #fff;
            font-family: 'Plus Jakarta Sans', sans-serif;
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center;
        }

        /* INTRO OVERLAY */
        #intro-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.8s ease;
        }

        #intro-overlay img {
            width: 200px; /* Ukuran GIF */
            margin-bottom: 20px;
        }

        #intro-overlay button {
            padding: 10px 25px;
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-weight: 800;
            letter-spacing: 2px;
            background: transparent;
            color: #fff;
            border: 2px solid #fff;
            cursor: pointer;
            border-radius: 50px;
            transition: 0.3s;
        }

        #intro-overlay button:hover {
            background: #fff;
            color: #000;
        }

        .stars-bg { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            z-index: -1; 
            background: radial-gradient(ellipse at bottom, #1B2735 0%, #090A0F 100%); 
        }

        /* JUDUL GLOWING */
        header { margin-top: 20px; margin-bottom: 20px; z-index: 5; text-align: center; }
        header h1 { 
            font-size: 2.8rem; 
            letter-spacing: -1px; 
            font-weight: 600;
            color: #fff;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.8),
                         0 0 20px rgba(255, 182, 193, 0.6), 
                         0 0 30px rgba(255, 182, 193, 0.4);
            animation: glowPulse 2s ease-in-out infinite alternate;
        }

        @keyframes glowPulse {
            from { transform: scale(1); text-shadow: 0 0 10px rgba(255, 255, 255, 0.8), 0 0 20px rgba(255, 182, 193, 0.6); }
            to { transform: scale(1.03); text-shadow: 0 0 20px rgba(255, 255, 255, 0.9), 0 0 40px rgba(255, 182, 193, 0.8); }
        }

        /* MARQUEE FOTO */
        .marquee-container {
            width: 100vw; overflow: hidden; display: flex;
            background: rgba(255, 255, 255, 0.02); padding: 50px 0;
            border-top: 1px solid rgba(255,255,255,0.1); border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .marquee-content { display: flex; gap: 40px; animation: scroll-loop 40s linear infinite; width: max-content; }
        
        .ad-frame { 
            width: 300px; flex-shrink: 0; background: #fff; padding: 15px 15px 45px; 
            box-shadow: 0 25px 50px rgba(0,0,0,0.7); transform: rotate(-1.5deg); 
        }
        .ad-frame img { width: 100%; aspect-ratio: 1/1; object-fit: cover; margin-bottom: 15px; }
        .wish-text { font-family: 'Reenie Beanie', cursive; color: #111; font-size: 1.8rem; text-align: center; }

        @keyframes scroll-loop { from { transform: translateX(0); } to { transform: translateX(-50%); } }

        #tapText { position: fixed; bottom: 30px; font-size: 0.65rem; color: rgba(255,255,255,0.4); letter-spacing: 3px; }
    </style>
</head>
<body>

<div id="intro-overlay">
    <img src="3.gif" alt="Intro Gif">
    <button onclick="startApp()">CLICK TO OPEN</button>
</div>

<div class="stars-bg"></div>

<header>
    <h1>four girls💅💞</h1>
</header>

<div class="marquee-container">
    <div class="marquee-content" id="track">
        <div class="ad-frame"><img src="foto 1.jpg"><p class="wish-text">Besties Forever</p></div>
        <div class="ad-frame"><img src="foto 2.jpg"><p class="wish-text">Akrab terus ya!</p></div>
        <div class="ad-frame"><img src="foto 3.jpg"><p class="wish-text">Jangan sampai pisah</p></div>
        <div class="ad-frame"><img src="foto 4.jpg"><p class="wish-text">Sukses bareng ✨</p></div>
        <div class="ad-frame"><img src="foto 5.jpg"><p class="wish-text">Our core memory</p></div>
        <div class="ad-frame"><img src="foto 6.jpg"><p class="wish-text">Stay slay, girls 💅</p></div>
        <div class="ad-frame"><img src="foto 7.jpg"><p class="wish-text">Support system</p></div>
        <div class="ad-frame"><img src="foto 8.jpg"><p class="wish-text">Sehat selalu kita</p></div>
        <div class="ad-frame"><img src="foto 9.jpg"><p class="wish-text">No drama, just love</p></div>
        <div class="ad-frame"><img src="foto 10.jpg"><p class="wish-text">Kawal sampe sukses</p></div>
        <div class="ad-frame"><img src="foto 11.jpg"><p class="wish-text">Together till end 💞</p></div>
    </div>
</div>

<p id="tapText">MUSIC IS PLAYING 🔊</p>

<audio id="bgMusic" loop><source src="hindia.mp3" type="audio/mpeg"></audio>

<script>
    const track = document.getElementById('track');
    track.innerHTML += track.innerHTML;

    function startApp() {
        // Putar musik
        const music = document.getElementById('bgMusic');
        music.play();
        
        // Sembunyikan intro
        const intro = document.getElementById('intro-overlay');
        intro.style.opacity = "0";
        setTimeout(() => {
            intro.style.display = "none";
        }, 800);

        // Update teks bawah
        document.getElementById('tapText').style.opacity = "0.4";
    }
</script>

</body>
</html>
