<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>four girls💅💞 | Together Forever</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;600;800&family=Reenie+Beanie&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background: #000; 
            overflow: hidden; 
            color: #fff;
            font-family: 'Plus Jakarta Sans', sans-serif;
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center;
        }

        /* INTRO SPEECH OVERLAY */
        #intro-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.8s ease, transform 0.8s ease;
            text-align: center;
            cursor: pointer;
        }

        #intro-overlay img {
            width: 150px; 
            margin-bottom: 20px;
        }

        #status-text {
            font-weight: 800;
            letter-spacing: 1px;
            color: #fff;
            margin-bottom: 10px;
            padding: 0 20px;
            text-shadow: 0 0 10px rgba(255,182,193,0.8);
        }

        #sub-status {
            font-size: 0.8rem;
            color: rgba(255,255,255,0.5);
            letter-spacing: 1px;
        }

        /* Animasi Wave Suara */
        .wave-container {
            display: none;
            justify-content: center;
            align-items: center;
            gap: 5px;
            height: 30px;
            margin-top: 20px;
        }
        .bar { width: 4px; height: 10px; background: #ffb6c1; border-radius: 10px; animation: wave 0.5s infinite alternate; }
        @keyframes wave { from { height: 10px; } to { height: 30px; } }

        .stars-bg { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            z-index: -1; 
            background: radial-gradient(ellipse at bottom, #1B2735 0%, #090A0F 100%); 
        }

        header { margin-top: 20px; margin-bottom: 20px; z-index: 5; text-align: center; }
        header h1 { 
            font-size: 2.8rem; 
            font-weight: 600;
            color: #fff;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.8),
                         0 0 20px rgba(255, 182, 193, 0.6);
            animation: glowPulse 2s ease-in-out infinite alternate;
        }

        @keyframes glowPulse {
            from { transform: scale(1); }
            to { transform: scale(1.03); }
        }

        .marquee-container {
            width: 100vw; overflow: hidden; display: flex;
            background: rgba(255, 255, 255, 0.02); padding: 50px 0;
            border-top: 1px solid rgba(255,255,255,0.1); border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .marquee-content { display: flex; gap: 40px; animation: scroll-loop 35s linear infinite; width: max-content; }
        
        .ad-frame { 
            width: 300px; flex-shrink: 0; background: #fff; padding: 15px 15px 45px; 
            box-shadow: 0 25px 50px rgba(0,0,0,0.7); transform: rotate(-1.5deg); 
        }
        .ad-frame img { width: 100%; aspect-ratio: 1/1; object-fit: cover; margin-bottom: 15px; }
        .wish-text { font-family: 'Reenie Beanie', cursive; color: #111; font-size: 1.8rem; text-align: center; }

        @keyframes scroll-loop { from { transform: translateX(0); } to { transform: translateX(-50%); } }

        #tapText { position: fixed; bottom: 30px; font-size: 0.65rem; color: rgba(255,255,255,0.4); letter-spacing: 3px; }
    </style>
</head>
<body>

<div id="intro-overlay" onclick="mulaiDengar()">
    <img src="3.gif" alt="Intro Gif">
    <h2 id="status-text">Absen Dulu Girls! 🎤</h2>
    <p id="sub-status">Klik layar, lalu sebut nama kalian<br>🎙</p>
    
    <div id="wave-visual" class="wave-container">
        <div class="bar"></div>
        <div class="bar" style="animation-delay: 0.1s;"></div>
        <div class="bar" style="animation-delay: 0.2s;"></div>
        <div class="bar" style="animation-delay: 0.3s;"></div>
    </div>
</div>

<div class="stars-bg"></div>

<header>
    <h1>four girls💅💞</h1>
</header>

<div class="marquee-container">
    <div class="marquee-content" id="track">
        <div class="ad-frame"><img src="foto 1.jpg"><p class="wish-text">Besties Forever</p></div>
        <div class="ad-frame"><img src="foto 2.jpg"><p class="wish-text">Akrab terus ya!</p></div>
        <div class="ad-frame"><img src="foto 3.jpg"><p class="wish-text">Jangan sampai pisah</p></div>
        <div class="ad-frame"><img src="foto 4.jpg"><p class="wish-text">Sukses bareng ✨</p></div>
        <div class="ad-frame"><img src="foto 5.jpg"><p class="wish-text">Our core memory</p></div>
        <div class="ad-frame"><img src="foto 6.jpg"><p class="wish-text">Stay slay, girls 💅</p></div>
        <div class="ad-frame"><img src="foto 7.jpg"><p class="wish-text">Support system</p></div>
        <div class="ad-frame"><img src="foto 8.jpg"><p class="wish-text">Sehat selalu kita</p></div>
        <div class="ad-frame"><img src="foto 9.jpg"><p class="wish-text">No drama, just love</p></div>
        <div class="ad-frame"><img src="foto 10.jpg"><p class="wish-text">Kawal sampe sukses</p></div>
        <div class="ad-frame"><img src="foto 11.jpg"><p class="wish-text">Together till end 💞</p></div>
    </div>
</div>

<p id="tapText">MUSIC IS PLAYING 🔊</p>

<audio id="bgMusic" loop><source src="hindia.mp3" type="audio/mpeg"></audio>

<script>
    const track = document.getElementById('track');
    track.innerHTML += track.innerHTML;

    const intro = document.getElementById('intro-overlay');
    const statusText = document.getElementById('status-text');
    const wave = document.getElementById('wave-visual');
    const music = document.getElementById('bgMusic');
    
    let sudahBuka = false;
    let sedangMendengar = false;

    function mulaiDengar() {
        if (sudahBuka || sedangMendengar) return;

        window.SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        
        if (!window.SpeechRecognition) {
            startApp();
            return;
        }

        const recognition = new SpeechRecognition();
        recognition.lang = 'id-ID';

        recognition.onstart = () => {
            sedangMendengar = true;
            statusText.innerText = "Lagi dengerin nih...";
            statusText.style.color = "#fff";
            wave.style.display = "flex";
        };

        recognition.onresult = (e) => {
            const hasil = e.results[0][0].transcript.toLowerCase();
            console.log("Suara terdeteksi: " + hasil);
            
            // Cek Nama (Variasi ejaan raisa ditambahkan)
            if (hasil.includes("diva") || hasil.includes("tasya") || hasil.includes("raisa") || hasil.includes("raisya") || hasil.includes("sifa") || hasil.includes("syifa")) {
                statusText.innerText = "Akses Diterima! Hello Girls ✨";
                statusText.style.color = "#ffb6c1";
                setTimeout(startApp, 1000);
            } else {
                statusText.innerText = "Eh, suara siapa tuh? Sebut nama kalian dong!";
                statusText.style.color = "#ff4b2b";
                sedangMendengar = false;
            }
        };

        recognition.onerror = () => { sedangMendengar = false; };
        recognition.onend = () => { 
            wave.style.display = "none";
            sedangMendengar = false; 
        };

        recognition.start();
    }

    function startApp() {
        if (sudahBuka) return;
        sudahBuka = true;
        
        music.play();
        intro.style.opacity = "0";
        intro.style.transform = "scale(1.2)";
        
        setTimeout(() => {
            intro.style.display = "none";
        }, 800);

        document.getElementById('tapText').style.opacity = "0.4";
    }
</script>

</body>
</html>
