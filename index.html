<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>four girls💅💞 | forever.</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600&family=Reenie+Beanie&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        /* 1. BACKGROUND HITAM BINTANG (STARFIELD) */
        body { 
            background: #000; /* Hitam pekat */
            overflow-x: hidden;
            color: #fff;
            font-family: 'Plus Jakarta Sans', sans-serif;
            display: flex; justify-content: center; min-height: 100vh;
        }

        /* 2. EFEK BINTANG BERGERAK (MENGGUNAKAN BOX-SHADOW) */
        #stars, #stars2, #stars3 {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            width: 1px; height: 1px; background: transparent;
            z-index: -1; /* Di belakang konten */
        }

        #stars {
            width: 1px; height: 1px;
            box-shadow: 100px 200px #fff, 500px 400px #fff, 800px 100px #fff, 1200px 700px #fff; /* Tambahin bintang di sini sesukamu */
            animation: animStar 50s linear infinite;
        }
        #stars2 {
            width: 2px; height: 2px;
            box-shadow: 200px 500px #fff, 900px 200px #fff, 1400px 600px #fff;
            animation: animStar 100s linear infinite;
        }
        #stars3 {
            width: 3px; height: 3px;
            box-shadow: 300px 100px #fff, 1100px 400px #fff, 1700px 900px #fff;
            animation: animStar 150s linear infinite;
        }

        @keyframes animStar {
            from { transform: translateY(0px); }
            to { transform: translateY(-2000px); }
        }

        /* 3. KONTEN (Ponsel Mockup) */
        .container {
            width: 100%; max-width: 450px;
            background: rgba(10, 10, 10, 0.9); /* Hitam agak transparan biar bintang kelihatan */
            backdrop-filter: blur(5px);
            min-height: 100vh; padding-bottom: 50px;
            position: relative;
        }

        /* Music Bar Floated */
        .music-player {
            position: sticky; top: 15px; z-index: 100;
            background: rgba(255, 255, 255, 0.05); /* Hampir transparan */
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 90%; margin: 0 auto;
            padding: 12px 20px; border-radius: 50px;
            display: flex; align-items: center; justify-content: center; gap: 12px;
            box-shadow: 0 4px 15px rgba(255,118,117,0.1);
            cursor: pointer; color: #ff7675; font-weight: 600; font-size: 0.8rem;
        }

        header { padding: 60px 20px 40px; text-align: center; }
        header h1 { font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 600; letter-spacing: -1px; font-size: 2.2rem; color: #fff; text-shadow: 0 0 10px rgba(255,255,255,0.2); }
        header p { font-size: 0.8rem; color: #bbb; margin-top: 5px; text-transform: uppercase; letter-spacing: 3px; }

        .mission-box {
            margin: 0 30px 50px; padding: 25px;
            background: rgba(255, 255, 255, 0.03); /* Hitam samar */
            border-radius: 20px; text-align: center;
            border: 1px dashed rgba(255, 118, 117, 0.3);
        }
        .mission-box p { font-size: 0.9rem; font-style: italic; color: #eee; line-height: 1.6; }

        /* Polaroid Gallery (Tetep Estetik) */
        .photo-list { padding: 0 30px; }
        .polaroid {
            background: white; padding: 15px 15px 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            margin-bottom: 45px; transition: 0.4s;
        }
        .polaroid:nth-child(odd) { transform: rotate(-2deg); }
        .polaroid:nth-child(even) { transform: rotate(2deg); }
        .polaroid:hover { transform: rotate(0deg) scale(1.03); z-index: 10; }
        
        .polaroid img { width: 100%; aspect-ratio: 1/1; object-fit: cover; margin-bottom: 20px; }
        .polaroid .caption {
            font-family: 'Reenie Beanie', cursive; font-size: 1.8rem;
            color: #2d3436; text-align: center;
        }

        footer { text-align: center; padding: 40px; color: #888; font-size: 0.75rem; letter-spacing: 1px; font-weight: 300; }

        /* Equalizer Animation */
        .eq { display: flex; align-items: flex-end; gap: 3px; height: 12px; }
        .bar { width: 2px; background: #ff7675; animation: bounce 0.6s infinite alternate; }
        .paused .bar { animation-play-state: paused; height: 3px; }
        @keyframes bounce { from { height: 4px; } to { height: 12px; } }
    </style>
</head>
<body>

<div id="stars"></div>
<div id="stars2"></div>
<div id="stars3"></div>

<div class="container">
    <audio id="mainAudio" loop>
        <source src="Hindia - everything u are Lirik Lagu.mp3" type="audio/mpeg">
    </audio>

    <div class="music-player" onclick="toggleMusic()">
        <div class="eq paused" id="eqAnim">
            <div class="bar"></div>
            <div class="bar" style="animation-delay: 0.2s"></div>
            <div class="bar" style="animation-delay: 0.4s"></div>
        </div>
        <span id="m-status">Tap to Play Hindia ✨</span>
    </div>

    <header>
        <h1>four girls💅💞</h1>
        <p>A Lifetime Journey</p>
    </header>

    <div class="mission-box">
        <p>"bismillah rencana terlaksana 🥰🥰🥰💅"</p>
        <small style="display:block; margin-top:10px; color:#fab1a0; font-size:0.6rem; font-style: normal; font-weight: bold;">06.02.2026</small>
    </div>

    <div class="photo-list">
        <div class="polaroid">
            <img src="foto 1.jpg">
            <p class="caption">just being us.</p>
        </div>

        <div class="polaroid">
            <img src="foto 2.jpg">
            <p class="caption">no drama, just love.</p>
        </div>

        <div class="polaroid">
            <img src="foto 3.jpg">
            <p class="caption">best team ❤️</p>
        </div>

        <div class="polaroid">
            <img src="foto 4.jpg">
            <p class="caption">forever vibes.</p>
        </div>
    </div>

    <footer>
        four girls💅💞 • 2026<br>
        Together is our favorite place.
    </footer>
</div>

<script>
    const audio = document.getElementById("mainAudio");
    const mStatus = document.getElementById("m-status");
    const eq = document.getElementById("eqAnim");

    function toggleMusic() {
        if (audio.paused) {
            audio.play();
            mStatus.innerText = "Playing: Hindia ✨";
            eq.classList.remove("paused");
        } else {
            audio.pause();
            mStatus.innerText = "Music Paused";
            eq.classList.add("paused");
        }
    }
</script>

</body>
</html>
