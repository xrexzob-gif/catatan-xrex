<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>four girls💅💞 | Together Forever</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;600;800&family=Reenie+Beanie&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background: #000; 
            overflow: hidden; 
            color: #fff;
            font-family: 'Plus Jakarta Sans', sans-serif;
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center;
        }

        /* INTRO CANVAS DRAWING DENGAN ANIMASI SUKSES */
        #intro-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: transform 1s ease-in-out, opacity 1s ease-in-out, background 0.5s ease;
            touch-action: none; /* Mencegah scroll saat menggambar */
        }

        /* Animasi Zoom Out & Fade Out saat sukses */
        #intro-overlay.success {
            transform: scale(1.5); /* Efek membesar pelan-pelan */
            opacity: 0;
            background: rgba(255, 182, 193, 0.2); /* Latar belakang merona pink */
            pointer-events: none; /* Klik tembus ke web utama */
        }

        #draw-canvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            cursor: crosshair;
        }

        #intro-content {
            position: relative;
            z-index: 10000;
            pointer-events: none; /* Klik tembus ke canvas di bawahnya */
            text-align: center;
            transition: opacity 0.5s ease;
        }

        /* Hilangkan konten tulisan saat sukses */
        #intro-overlay.success #intro-content {
            opacity: 0;
        }

        #intro-content img {
            width: 150px; 
            margin-bottom: 20px;
            opacity: 0.8;
        }

        #intro-content h2 {
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-weight: 800;
            letter-spacing: 2px;
            color: #fff;
            text-shadow: 0 0 10px rgba(255,182,193,0.8);
        }

        #intro-content p {
            font-size: 0.8rem;
            color: rgba(255,255,255,0.5);
            margin-top: 10px;
            letter-spacing: 1px;
        }

        .stars-bg { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            z-index: -1; 
            background: radial-gradient(ellipse at bottom, #1B2735 0%, #090A0F 100%); 
        }

        /* JUDUL GLOWING (TETAP SAMA) */
        header { margin-top: 20px; margin-bottom: 20px; z-index: 5; text-align: center; }
        header h1 { 
            font-size: 2.8rem; 
            letter-spacing: -1px; 
            font-weight: 600;
            color: #fff;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.8),
                         0 0 20px rgba(255, 182, 193, 0.6), 
                         0 0 30px rgba(255, 182, 193, 0.4);
            animation: glowPulse 2s ease-in-out infinite alternate;
        }

        @keyframes glowPulse {
            from { transform: scale(1); text-shadow: 0 0 10px rgba(255, 255, 255, 0.8), 0 0 20px rgba(255, 182, 193, 0.6); }
            to { transform: scale(1.03); text-shadow: 0 0 20px rgba(255, 255, 255, 0.9), 0 0 40px rgba(255, 182, 193, 0.8); }
        }

        /* MARQUEE FOTO (TETAP SAMA) */
        .marquee-container {
            width: 100vw; overflow: hidden; display: flex;
            background: rgba(255, 255, 255, 0.02); padding: 50px 0;
            border-top: 1px solid rgba(255,255,255,0.1); border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .marquee-content { display: flex; gap: 40px; animation: scroll-loop 35s linear infinite; width: max-content; }
        
        .ad-frame { 
            width: 300px; flex-shrink: 0; background: #fff; padding: 15px 15px 45px; 
            box-shadow: 0 25px 50px rgba(0,0,0,0.7); transform: rotate(-1.5deg); 
        }
        .ad-frame img { width: 100%; aspect-ratio: 1/1; object-fit: cover; margin-bottom: 15px; }
        .wish-text { font-family: 'Reenie Beanie', cursive; color: #111; font-size: 1.8rem; text-align: center; }

        @keyframes scroll-loop { from { transform: translateX(0); } to { transform: translateX(-50%); } }

        #tapText { position: fixed; bottom: 30px; font-size: 0.65rem; color: rgba(255,255,255,0.4); letter-spacing: 3px; }
    </style>
</head>
<body>

<div id="intro-overlay">
    <canvas id="draw-canvas"></canvas>
    <div id="intro-content">
        <img src="3.gif" alt="Intro Gif">
        <h2>GAMBAR LOVE ❤️</h2>
        <p>Gunakan jarimu di layar untuk membuka web</p>
    </div>
</div>

<div class="stars-bg"></div>

<header>
    <h1>four girls💅💞</h1>
</header>

<div class="marquee-container">
    <div class="marquee-content" id="track">
        <div class="ad-frame"><img src="foto 1.jpg"><p class="wish-text">Besties Forever</p></div>
        <div class="ad-frame"><img src="foto 2.jpg"><p class="wish-text">Akrab terus ya!</p></div>
        <div class="ad-frame"><img src="foto 3.jpg"><p class="wish-text">Jangan sampai pisah</p></div>
        <div class="ad-frame"><img src="foto 4.jpg"><p class="wish-text">Sukses bareng ✨</p></div>
        <div class="ad-frame"><img src="foto 5.jpg"><p class="wish-text">Our core memory</p></div>
        <div class="ad-frame"><img src="foto 6.jpg"><p class="wish-text">Stay slay, girls 💅</p></div>
        <div class="ad-frame"><img src="foto 7.jpg"><p class="wish-text">Support system</p></div>
        <div class="ad-frame"><img src="foto 8.jpg"><p class="wish-text">Sehat selalu kita</p></div>
        <div class="ad-frame"><img src="foto 9.jpg"><p class="wish-text">No drama, just love</p></div>
        <div class="ad-frame"><img src="foto 10.jpg"><p class="wish-text">Kawal sampe sukses</p></div>
        <div class="ad-frame"><img src="foto 11.jpg"><p class="wish-text">Together till end 💞</p></div>
    </div>
</div>

<p id="tapText">MUSIC IS PLAYING 🔊</p>

<audio id="bgMusic" loop><source src="hindia.mp3" type="audio/mpeg"></audio>

<script>
    // Duplicate marquee content
    const track = document.getElementById('track');
    track.innerHTML += track.innerHTML;

    // Canvas Drawing Logic
    const canvas = document.getElementById('draw-canvas');
    const ctx = canvas.getContext('2d');
    const intro = document.getElementById('intro-overlay');
    const music = document.getElementById('bgMusic');
    
    let drawing = false;
    let points = [];

    function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    // Line Style
    ctx.strokeStyle = '#ffb6c1'; // Pink Glow awal
    ctx.lineWidth = 6;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.shadowBlur = 15;
    ctx.shadowColor = '#ffb6c1';

    function startDrawing(e) {
        if (intro.classList.contains('success')) return; // Jangan gambar kalau sudah sukses
        drawing = true;
        points = [];
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        addPoint(e);
    }

    function draw(e) {
        if (!drawing || intro.classList.contains('success')) return;
        addPoint(e);
        
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.beginPath();
        if (points.length > 0) {
            ctx.moveTo(points[0].x, points[0].y);
            for (let i = 1; i < points.length; i++) {
                ctx.lineTo(points[i].x, points[i].y);
            }
        }
        ctx.stroke();
    }

    function stopDrawing() {
        if (!drawing || intro.classList.contains('success')) return;
        drawing = false;
        checkHeart();
    }

    function addPoint(e) {
        const x = e.touches ? e.touches[0].clientX : e.clientX;
        const y = e.touches ? e.touches[0].clientY : e.clientY;
        points.push({x, y});
    }

    function checkHeart() {
        if (points.length < 15) return; 

        const xs = points.map(p => p.x);
        const ys = points.map(p => p.y);
        const width = Math.max(...xs) - Math.min(...xs);
        const height = Math.max(...ys) - Math.min(...ys);

        // Syarat Sukses: Gambar cukup lebar dan tinggi
        if (width > 60 && height > 60) {
            
            // ANIMASI SUKSES 1: Ubah garis jadi Putih Terang (Glowing)
            ctx.strokeStyle = '#fff';
            ctx.shadowColor = '#fff';
            ctx.lineWidth = 8;
            ctx.stroke();
            
            // Mulai Transisi Web Utama
            startApp();
        } else {
            // Kalau salah, hapus garis pelan-pelan
            setTimeout(() => {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
            }, 300);
        }
    }

    function startApp() {
        // ANIMASI SUKSES 2: Tambahkan class 'success' untuk memicu CSS transition
        intro.classList.add('success');
        
        // Putar musik
        music.play();
        
        // ANIMASI SUKSES 3: Zoom Out & Fade Out Intro pelan-pelan
        setTimeout(() => {
            intro.style.display = "none";
        }, 1000); // Sinkron dengan durasi transition CSS (1s)
        
        document.getElementById('tapText').style.opacity = "0.4";
    }

    // Handlers
    canvas.addEventListener('mousedown', startDrawing);
    canvas.addEventListener('mousemove', draw);
    window.addEventListener('mouseup', stopDrawing);

    canvas.addEventListener('touchstart', (e) => { e.preventDefault(); startDrawing(e); });
    canvas.addEventListener('touchmove', (e) => { e.preventDefault(); draw(e); });
    canvas.addEventListener('touchend', stopDrawing);
</script>

</body>
</html>
