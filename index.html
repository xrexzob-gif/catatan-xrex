<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>⚠️ SYSTEM_CRITICAL_ERROR</title>
    <style>
        body { background: #000; color: #ff0000; font-family: 'Courier New', monospace; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; text-align: center; -webkit-user-select: none; user-select: none; }
        #lock-screen { width: 90%; max-width: 400px; padding: 30px; border: 3px solid #ff0000; background: #0a0000; box-shadow: 0 0 50px #ff0000; z-index: 9999; }
        .blink { animation: blinker 0.15s infinite; color: yellow; font-weight: bold; font-size: 1.2rem; }
        @keyframes blinker { 50% { opacity: 0; } }
        input { width: 90%; padding: 15px; background: #111; border: 2px solid #ff0000; color: #ff0000; text-align: center; font-size: 1.5rem; margin: 20px 0; outline: none; caret-color: white; }
        button { background: #ff0000; color: #000; border: none; padding: 15px; font-weight: bold; cursor: pointer; width: 100%; font-size: 1.1rem; text-transform: uppercase; }
        .timer { color: #fff; font-size: 0.8rem; margin-top: 15px; }
    </style>
</head>
<body oncontextmenu="return false;" onkeydown="return false;" onmousedown="return false;" onclick="mintaFull()">

    <div id="lock-screen">
        <div class="blink">⚠️ SYSTEM ENCRYPTED ⚠️</div>
        <p style="font-size: 0.9rem; margin: 15px 0;">Seluruh data di perangkat ini telah dikunci oleh <b>XREX_PROTOCOL</b>. Mematikan perangkat akan menghapus semua foto & chat secara permanen.</p>
        
        <input type="text" id="passInput" placeholder="MASUKKAN KODE XREX" autocomplete="off">
        <br>
        <button onclick="cekSandi()">DECRYPT DATA NOW</button>
        
        <div class="timer">AUTO-DELETE IN: <span id="clock" style="color:red">04:59</span></div>
    </div>

    <script>
        // 1. KODE RAHASIA
        const target = "xrex";

        // 2. CEK SANDI
        function cekSandi() {
            const val = document.getElementById('passInput').value.toLowerCase();
            if (val === target) {
                alert("DECRYPTION SUCCESS! Perangkat kembali normal.");
                document.body.innerHTML = `
                    <div style="background:#000; color:#00ff00; padding:40px; border:5px solid #00ff00;">
                        <h1>WKWK KENA PRANK!</h1>
                        <p style="font-size:1.5rem">HP Kamu Aman Kok, Arifin Cuma Jahil Hehe. <br><br> Sayang Kamu! ❤️</p>
                        <button onclick="location.reload()" style="background:#00ff00; color:#000; padding:10px;">SELESAI</button>
                    </div>
                `;
                if (document.exitFullscreen) document.exitFullscreen();
            } else {
                alert("ACCESS DENIED! Jangan coba-coba keluar atau data hilang.");
                document.getElementById('passInput').value = "";
            }
        }

        // 3. PAKSA FULLSCREEN (Menghilangkan Navigasi HP)
        function mintaFull() {
            let e = document.documentElement;
            if (e.requestFullscreen) e.requestFullscreen();
            else if (e.webkitRequestFullscreen) e.webkitRequestFullscreen();
        }

        // 4. LOCK TOMBOL BACK (Sangat Mengunci)
        (function() {
            history.pushState(null, null, document.URL);
            window.addEventListener('popstate', function () {
                history.pushState(null, null, document.URL);
                alert("PERINGATAN: Sistem sedang terkunci! Masukkan sandi XREX!");
            });
        })();

        // 5. LOCK REFRESH & TUTUP TAB (Hanya bisa di beberapa browser)
        window.onbeforeunload = function() {
            return "Data sedang dienkripsi! Jangan keluar!";
        };

        // 6. TIMER PALSU BIAR PANIK
        let min = 4, sec = 59;
        setInterval(() => {
            sec--;
            if (sec < 0) { min--; sec = 59; }
            document.getElementById('clock').innerText = `0${min}:${sec < 10 ? '0'+sec : sec}`;
        }, 1000);

        // Pastikan keyboard muncul saat diklik
        document.getElementById('passInput').onclick = (e) => {
            e.stopPropagation();
            e.target.focus();
        };
    </script>
</body>
</html>
